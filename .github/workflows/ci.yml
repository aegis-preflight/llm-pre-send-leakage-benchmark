---
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs for the same PR when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: lint, type-check, test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Type check (mypy --strict)
        run: uv run mypy .

      - name: Security scan (bandit)
        run: uv run bandit -r corpus harness -ll -c pyproject.toml
        # -ll = report only medium+ severity

      - name: Secret scan (gitleaks)
        # We invoke the gitleaks CLI directly instead of using
        # gitleaks/gitleaks-action@v2 — the Action is paywalled for GitHub
        # organizations (requires GITLEAKS_LICENSE), but the underlying CLI
        # is Apache 2.0 and free for any user. Same scan, same config.
        # Pinned to the same version as .pre-commit-config.yaml.
        env:
          GITLEAKS_VERSION: "8.18.4"
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect \
            --config .gitleaks.toml \
            --source . \
            --no-banner \
            --verbose \
            --redact

      - name: Run tests with coverage
        # Coverage threshold raised from 0 → 80 in PR #2 once corpus/generate.py
        # landed with real source to measure. Current measured coverage on
        # corpus/generate.py is 97.7%; 80 leaves room for harness PRs while
        # keeping a real bar.
        run: |
          uv run pytest \
            --cov \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14
